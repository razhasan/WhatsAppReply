<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Salaam Cards — WhatsApp Reply Picker</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Jost:wght@400;500;600;700&display=swap');

        :root {
            --bg1: #ff6a3d;
            --bg2: #ff3d77;
            --bg3: #7b2ff7;
            --bg4: #00c2a8;
            --panel: rgba(20, 14, 30, 0.55);
            --panel-light: rgba(30, 20, 42, 0.65);
            --gold: #ffd166;
            --gold-bright: #ffe29a;
            --cream: #fff8ee;
            --cream-dim: #e9dcc9;
            --line: rgba(255, 209, 102, 0.35);
            --whatsapp: #3ccf7a;
            --radius: 14px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.35);
        }

        * {
            box-sizing: border-box;
        }

        html,
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(-45deg, var(--bg1), var(--bg2), var(--bg3), var(--bg4));
            background-size: 400% 400%;
            animation: gradientShift 18s ease infinite;
            color: var(--cream);
            font-family: 'Jost', sans-serif;
            min-height: 100vh;
        }

        @keyframes gradientShift {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            html,
            body {
                animation: none;
            }
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                radial-gradient(circle at 15% 20%, rgba(255, 255, 255, 0.08) 0, transparent 35%),
                radial-gradient(circle at 85% 80%, rgba(0, 0, 0, 0.12) 0, transparent 45%);
            pointer-events: none;
            z-index: 0;
        }

        .wrap {
            position: relative;
            z-index: 1;
            max-width: 1080px;
            margin: 0 auto;
            padding: 28px 20px 80px;
        }

        header.top {
            text-align: center;
            margin-bottom: 30px;
        }

        .eyebrow {
            font-size: 12px;
            letter-spacing: 0.28em;
            text-transform: uppercase;
            color: var(--gold);
            margin-bottom: 10px;
            font-weight: 600;
        }

        h1 {
            font-family: 'Amiri', serif;
            font-weight: 700;
            font-size: clamp(30px, 5vw, 46px);
            margin: 0 0 8px;
            color: var(--cream);
            letter-spacing: 0.01em;
        }

        h1 .accent {
            color: var(--gold-bright);
        }

        .sub {
            color: var(--cream-dim);
            font-size: 15px;
            max-width: 520px;
            margin: 0 auto;
            line-height: 1.5;
        }

        .islamic-date {
            font-family: 'Amiri', serif;
            font-size: 17px;
            color: var(--gold-bright);
            margin-top: 8px;
            direction: rtl;
            opacity: 0.85;
            letter-spacing: 0.5px;
            background: rgba(0, 0, 0, 0.15);
            display: inline-block;
            padding: 4px 20px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
        }

        .tabs-wrapper {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px;
            margin: 30px 0 26px;
            border-bottom: 1px solid var(--line);
            padding-bottom: 18px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            flex: 1;
        }

        .tab {
            background: var(--panel);
            border: 1px solid var(--line);
            color: var(--cream-dim);
            padding: 10px 18px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all .18s ease;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .tab .count {
            font-size: 11px;
            background: rgba(205, 164, 94, 0.15);
            color: var(--gold-bright);
            padding: 1px 7px;
            border-radius: 999px;
        }

        .tab:hover {
            border-color: var(--gold);
            color: var(--cream);
        }

        .tab.active {
            background: linear-gradient(135deg, var(--gold) 0%, #9c7a3d 100%);
            color: #1a1305;
            border-color: transparent;
            font-weight: 600;
        }

        .tab.active .count {
            background: rgba(0, 0, 0, 0.18);
            color: #1a1305;
        }

        .add-cat-btn {
            background: transparent;
            border: 1px dashed var(--line);
            color: var(--cream-dim);
            padding: 10px 16px;
            border-radius: 999px;
            font-size: 14px;
            cursor: pointer;
            white-space: nowrap;
            transition: all .18s ease;
        }

        .add-cat-btn:hover {
            border-color: var(--gold);
            color: var(--gold-bright);
        }

        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 18px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .cat-title {
            font-family: 'Amiri', serif;
            font-size: 22px;
            color: var(--gold-bright);
        }

        .toolbar-actions {
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .random-btn {
            background: var(--panel-light);
            border: 1px solid var(--gold);
            color: var(--gold-bright);
            padding: 9px 20px;
            border-radius: 30px;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all .15s ease;
            letter-spacing: 0.3px;
        }

        .random-btn:hover {
            background: var(--gold);
            color: #1a1305;
            border-color: var(--gold);
        }

        .random-btn svg {
            width: 18px;
            height: 18px;
        }

        .upload-btn {
            background: var(--panel-light);
            border: 1px solid var(--line);
            color: var(--cream);
            padding: 9px 16px;
            border-radius: 10px;
            font-size: 13px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 7px;
            transition: all .15s ease;
        }

        .upload-btn:hover {
            border-color: var(--gold);
            background: var(--panel);
        }

        .upload-btn svg {
            width: 15px;
            height: 15px;
        }

        input[type=file] {
            display: none;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 16px;
        }

        .card {
            position: relative;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            overflow: hidden;
            cursor: pointer;
            aspect-ratio: 3/4;
            transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
        }

        .card:hover {
            transform: translateY(-4px);
            box-shadow: var(--shadow);
            border-color: var(--gold);
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .card .hover-mark {
            position: absolute;
            inset: 0;
            background: linear-gradient(to top, rgba(15, 36, 25, 0.85) 0, rgba(15, 36, 25, 0) 45%);
            display: flex;
            align-items: flex-end;
            justify-content: center;
            padding: 10px;
            opacity: 0;
            transition: opacity .18s ease;
        }

        .card:hover .hover-mark {
            opacity: 1;
        }

        .hover-mark span {
            font-size: 12px;
            color: var(--gold-bright);
            font-weight: 600;
            letter-spacing: .05em;
        }

        .card .del-btn {
            position: absolute;
            top: 6px;
            right: 6px;
            width: 24px;
            height: 24px;
            border-radius: 50%;
            background: rgba(15, 36, 25, 0.75);
            border: 1px solid var(--line);
            color: var(--cream-dim);
            font-size: 14px;
            line-height: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            transition: opacity .15s ease;
        }

        .card:hover .del-btn {
            opacity: 1;
        }

        .del-btn:hover {
            color: #ff8a8a;
            border-color: #ff8a8a;
        }

        .card.selected {
            border-color: var(--gold-bright);
            box-shadow: 0 0 0 3px rgba(255, 209, 102, 0.35), var(--shadow);
        }

        .card .wa-quick-btn {
            position: absolute;
            bottom: 8px;
            right: 8px;
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--whatsapp), #279a55);
            color: #06170d;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 0 3px 10px rgba(0, 0, 0, 0.4);
            z-index: 3;
        }

        .card .wa-quick-btn svg {
            width: 18px;
            height: 18px;
        }

        .card .wa-quick-btn:active {
            transform: scale(0.92);
        }

        .card .check-badge {
            position: absolute;
            top: 8px;
            left: 8px;
            width: 26px;
            height: 26px;
            border-radius: 50%;
            background: var(--whatsapp);
            color: #06170d;
            display: none;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 700;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
        }

        .card.selected .check-badge {
            display: flex;
        }

        /* -------- TEXT CARD STYLES -------- */
        .card.text-card {
            aspect-ratio: auto;
            min-height: 170px;
            padding: 16px 14px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: var(--radius);
            cursor: pointer;
            transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
            backdrop-filter: blur(6px);
        }

        .card.text-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow);
            border-color: var(--gold);
        }

        .card.text-card .text-content {
            font-family: 'Amiri', serif;
            font-size: 15px;
            line-height: 1.7;
            color: var(--cream);
            display: -webkit-box;
            -webkit-line-clamp: 7;
            -webkit-box-orient: vertical;
            overflow: hidden;
            text-overflow: ellipsis;
            word-break: break-word;
            direction: rtl;
            text-align: right;
        }

        .card.text-card .text-content .greeting {
            color: var(--gold-bright);
            font-weight: 700;
            display: block;
            margin-bottom: 6px;
            font-size: 16px;
        }

        .card.text-card .text-footer {
            margin-top: 10px;
            font-size: 11px;
            color: var(--cream-dim);
            opacity: 0.7;
            direction: rtl;
            text-align: right;
            border-top: 1px solid var(--line);
            padding-top: 8px;
            font-family: 'Amiri', serif;
        }

        .empty {
            grid-column: 1 / -1;
            text-align: center;
            padding: 50px 20px;
            border: 1px dashed var(--line);
            border-radius: var(--radius);
            color: var(--cream-dim);
        }

        .empty p {
            margin: 6px 0;
            font-size: 14px;
        }

        .empty .big {
            font-family: 'Amiri', serif;
            font-size: 19px;
            color: var(--gold-bright);
            margin-bottom: 8px;
        }

        /* Modal */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(6, 14, 10, 0.82);
            backdrop-filter: blur(3px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 50;
            padding: 20px;
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--panel);
            border: 1px solid var(--line);
            border-radius: 18px;
            max-width: 440px;
            width: 100%;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
            position: relative;
        }

        .modal-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            background: rgba(6, 14, 10, 0.55);
            border: 1px solid var(--line);
            color: var(--cream);
            font-size: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 2;
        }

        .modal-img-wrap {
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            max-height: 55vh;
            overflow: hidden;
        }

        .modal-img-wrap img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            max-height: 55vh;
        }

        .modal-body {
            padding: 18px 20px 22px;
        }

        .modal-name {
            font-size: 14px;
            color: var(--cream-dim);
            margin-bottom: 14px;
            direction: rtl;
            text-align: right;
            font-family: 'Amiri', serif;
            line-height: 1.8;
            max-height: 300px;
            overflow-y: auto;
            padding: 4px 0;
            white-space: pre-wrap;
        }

        .modal-name .greeting-modal {
            color: var(--gold-bright);
            font-weight: 700;
            font-size: 16px;
            display: block;
            margin-bottom: 8px;
        }

        .modal-name .ref-modal {
            color: var(--gold);
            font-size: 13px;
            display: block;
            margin-top: 10px;
            opacity: 0.8;
        }

        .modal-name .date-modal {
            color: var(--cream-dim);
            font-size: 12px;
            display: block;
            margin-top: 8px;
            opacity: 0
