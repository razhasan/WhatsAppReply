<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salaam Cards — WhatsApp Reply Picker</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Jost:wght@400;500;600;700&display=swap');

  :root{
    --bg: #0f2419;
    --bg-soft: #14301f;
    --panel: #17351f;
    --panel-light: #1c3d26;
    --gold: #cda45e;
    --gold-bright: #e6c47f;
    --cream: #f4ecd8;
    --cream-dim: #cfc4a6;
    --line: rgba(205,164,94,0.25);
    --whatsapp: #3ccf7a;
    --radius: 14px;
    --shadow: 0 10px 30px rgba(0,0,0,0.35);
  }

  *{ box-sizing: border-box; }

  html,body{
    margin:0; padding:0;
    background: radial-gradient(ellipse at top, var(--bg-soft) 0%, var(--bg) 65%);
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    min-height: 100vh;
  }

  body::before{
    content:'';
    position: fixed; inset:0;
    background-image:
      radial-gradient(circle at 15% 20%, rgba(205,164,94,0.06) 0, transparent 35%),
      radial-gradient(circle at 85% 80%, rgba(60,207,122,0.05) 0, transparent 40%);
    pointer-events:none;
    z-index:0;
  }

  .wrap{
    position: relative;
    z-index: 1;
    max-width: 1080px;
    margin: 0 auto;
    padding: 28px 20px 80px;
  }

  header.top{
    text-align:center;
    margin-bottom: 30px;
  }

  .eyebrow{
    font-size: 12px;
    letter-spacing: 0.28em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
    font-weight: 600;
  }

  h1{
    font-family: 'Amiri', serif;
    font-weight: 700;
    font-size: clamp(30px, 5vw, 46px);
    margin: 0 0 8px;
    color: var(--cream);
    letter-spacing: 0.01em;
  }

  h1 .accent{ color: var(--gold-bright); }

  .sub{
    color: var(--cream-dim);
    font-size: 15px;
    max-width: 520px;
    margin: 0 auto;
    line-height: 1.5;
  }

  /* Category tabs */
  .tabs{
    display:flex;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: center;
    margin: 30px 0 26px;
    border-bottom: 1px solid var(--line);
    padding-bottom: 18px;
  }

  .tab{
    background: var(--panel);
    border: 1px solid var(--line);
    color: var(--cream-dim);
    padding: 10px 18px;
    border-radius: 999px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .18s ease;
    display:flex;
    align-items:center;
    gap: 8px;
  }
  .tab .count{
    font-size: 11px;
    background: rgba(205,164,94,0.15);
    color: var(--gold-bright);
    padding: 1px 7px;
    border-radius: 999px;
  }
  .tab:hover{ border-color: var(--gold); color: var(--cream); }
  .tab.active{
    background: linear-gradient(135deg, var(--gold) 0%, #9c7a3d 100%);
    color: #1a1305;
    border-color: transparent;
    font-weight: 600;
  }
  .tab.active .count{ background: rgba(0,0,0,0.18); color: #1a1305; }

  .add-cat-btn{
    background: transparent;
    border: 1px dashed var(--line);
    color: var(--cream-dim);
    padding: 10px 16px;
    border-radius: 999px;
    font-size: 14px;
    cursor: pointer;
  }
  .add-cat-btn:hover{ border-color: var(--gold); color: var(--gold-bright); }

  /* Toolbar under tabs */
  .toolbar{
    display:flex;
    justify-content: space-between;
    align-items:center;
    margin-bottom: 18px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .cat-title{
    font-family: 'Amiri', serif;
    font-size: 22px;
    color: var(--gold-bright);
  }

  .upload-btn{
    background: var(--panel-light);
    border: 1px solid var(--line);
    color: var(--cream);
    padding: 9px 16px;
    border-radius: 10px;
    font-size: 13px;
    cursor: pointer;
    display:flex;
    align-items:center;
    gap:7px;
    transition: all .15s ease;
  }
  .upload-btn:hover{ border-color: var(--gold); background: var(--panel); }
  .upload-btn svg{ width:15px; height:15px; }

  /* Grid */
  .grid{
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 16px;
  }

  .card{
    position: relative;
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    aspect-ratio: 3/4;
    transition: transform .18s ease, box-shadow .18s ease, border-color .18s ease;
  }
  .card:hover{
    transform: translateY(-4px);
    box-shadow: var(--shadow);
    border-color: var(--gold);
  }
  .card img{
    width:100%; height:100%;
    object-fit: cover;
    display:block;
  }
  .card .hover-mark{
    position:absolute; inset:0;
    background: linear-gradient(to top, rgba(15,36,25,0.85) 0%, rgba(15,36,25,0) 45%);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    padding: 10px;
    opacity:0;
    transition: opacity .18s ease;
  }
  .card:hover .hover-mark{ opacity:1; }
  .hover-mark span{
    font-size: 12px;
    color: var(--gold-bright);
    font-weight:600;
    letter-spacing: .05em;
  }

  .card .del-btn{
    position:absolute; top:6px; right:6px;
    width: 24px; height:24px;
    border-radius:50%;
    background: rgba(15,36,25,0.75);
    border: 1px solid var(--line);
    color: var(--cream-dim);
    font-size: 14px;
    line-height:1;
    display:flex; align-items:center; justify-content:center;
    cursor:pointer;
    opacity:0;
    transition: opacity .15s ease;
  }
  .card:hover .del-btn{ opacity:1; }
  .del-btn:hover{ color:#ff8a8a; border-color:#ff8a8a; }

  /* Empty state */
  .empty{
    grid-column: 1 / -1;
    text-align:center;
    padding: 50px 20px;
    border: 1px dashed var(--line);
    border-radius: var(--radius);
    color: var(--cream-dim);
  }
  .empty p{ margin: 6px 0; font-size: 14px; }
  .empty .big{ font-family:'Amiri', serif; font-size: 19px; color: var(--gold-bright); margin-bottom: 8px; }

  /* Modal */
  .modal-overlay{
    position: fixed; inset:0;
    background: rgba(6,14,10,0.82);
    backdrop-filter: blur(3px);
    display:none;
    align-items:center;
    justify-content:center;
    z-index: 50;
    padding: 20px;
  }
  .modal-overlay.open{ display:flex; }

  .modal{
    background: var(--panel);
    border: 1px solid var(--line);
    border-radius: 18px;
    max-width: 420px;
    width: 100%;
    overflow:hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  .modal-img-wrap{
    background: #000;
    display:flex; align-items:center; justify-content:center;
    max-height: 55vh;
    overflow:hidden;
  }
  .modal-img-wrap img{ width:100%; height:100%; object-fit:contain; max-height:55vh; }

  .modal-body{ padding: 18px 20px 22px; }
  .modal-name{ font-size: 13px; color: var(--cream-dim); margin-bottom: 14px; }

  .actions{ display:flex; flex-direction:column; gap:9px; }

  .btn{
    border:none;
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 14px;
    font-weight: 600;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
    gap: 8px;
    transition: transform .12s ease, filter .12s ease;
  }
  .btn:active{ transform: scale(0.98); }
  .btn svg{ width:16px; height:16px; flex-shrink:0; }

  .btn-primary{
    background: linear-gradient(135deg, var(--whatsapp), #279a55);
    color: #06170d;
  }
  .btn-primary:hover{ filter: brightness(1.08); }

  .btn-secondary{
    background: var(--panel-light);
    color: var(--cream);
    border: 1px solid var(--line);
  }
  .btn-secondary:hover{ border-color: var(--gold); }

  .btn-ghost{
    background: transparent;
    color: var(--cream-dim);
    border: 1px solid transparent;
    font-weight: 500;
    font-size: 13px;
  }
  .btn-ghost:hover{ color: var(--cream); }

  .status-msg{
    text-align:center;
    font-size: 12.5px;
    color: var(--gold-bright);
    margin-top: 10px;
    min-height: 16px;
  }

  .modal-close{
    position:absolute;
    top: 12px; right: 12px;
    width: 30px; height:30px;
    border-radius: 50%;
    background: rgba(6,14,10,0.55);
    border: 1px solid var(--line);
    color: var(--cream);
    font-size: 16px;
    cursor:pointer;
    display:flex; align-items:center; justify-content:center;
    z-index: 2;
  }

  .modal{ position: relative; }

  /* toast */
  .toast{
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--panel-light);
    border: 1px solid var(--gold);
    color: var(--cream);
    padding: 12px 20px;
    border-radius: 10px;
    font-size: 13.5px;
    box-shadow: var(--shadow);
    opacity: 0;
    pointer-events:none;
    transition: all .25s ease;
    z-index: 100;
  }
  .toast.show{ opacity:1; transform: translateX(-50%) translateY(0); }

  footer.note{
    text-align:center;
    color: var(--cream-dim);
    font-size: 12px;
    margin-top: 50px;
    opacity: 0.7;
    line-height: 1.6;
  }

  input[type=file]{ display:none; }

  @media (max-width: 480px){
    .grid{ grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 12px; }
  }
</style>
</head>
<body>

<div class="wrap">
  <header class="top">
    <div class="eyebrow">Quick Reply Cards</div>
    <h1>Salaam <span class="accent">Cards</span></h1>
    <p class="sub">Pick a card, copy it, paste it straight into WhatsApp. Sorted by category so the right reply is always one tap away.</p>
  </header>

  <nav class="tabs" id="tabs"></nav>

  <div class="toolbar">
    <div class="cat-title" id="catTitle"></div>
    <button class="upload-btn" id="uploadBtn">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
      Add image
    </button>
    <input type="file" id="fileInput" accept="image/*" multiple>
  </div>

  <div class="grid" id="grid"></div>

  <footer class="note">Cards you add are saved in this browser only, on this device.<br>Tap "Copy image", then open WhatsApp and paste it into the chat.</footer>
</div>

<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <button class="modal-close" id="modalClose">✕</button>
    <div class="modal-img-wrap"><img id="modalImg" src="" alt=""></div>
    <div class="modal-body">
      <div class="modal-name" id="modalName"></div>
      <div class="actions">
        <button class="btn btn-primary" id="copyBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
          Copy image
        </button>
        <button class="btn btn-secondary" id="openWaBtn">
          <svg viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.1-1.7-.9-2-.9-.3-.1-.5-.1-.7.1-.2.3-.8.9-.9 1.1-.2.2-.3.2-.6.1-.3-.1-1.3-.5-2.4-1.5-.9-.8-1.5-1.8-1.7-2.1-.2-.3 0-.5.1-.6.1-.1.3-.3.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5C10 9 9.4 7.6 9.2 7c-.2-.5-.4-.5-.6-.5h-.5c-.2 0-.5.1-.7.3-.3.3-1 1-1 2.4s1 2.8 1.2 3c.1.2 2.1 3.2 5 4.5.7.3 1.3.5 1.7.6.7.2 1.4.2 1.9.1.6-.1 1.7-.7 1.9-1.4.2-.7.2-1.2.2-1.4-.1-.1-.3-.2-.6-.3z"/><path d="M12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.6 1.4 5.1L2 22l5.1-1.3C8.5 21.6 10.2 22 12 22c5.5 0 10-4.5 10-10S17.5 2 12 2zm0 18c-1.6 0-3.1-.4-4.5-1.2l-.3-.2-3.3.9.9-3.2-.2-.3C3.7 14.6 3.2 13.3 3.2 12c0-4.8 3.9-8.7 8.7-8.7s8.7 3.9 8.7 8.7-3.8 8.8-8.6 8.8z"/></svg>
          Open WhatsApp
        </button>
        <button class="btn btn-secondary" id="downloadBtn">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          Download
        </button>
        <button class="btn btn-ghost" id="deleteFromModal" style="display:none;">Remove this card</button>
      </div>
      <div class="status-msg" id="statusMsg"></div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="data.js"></script>
<script src="app.js"></script>
</body>
</html>
